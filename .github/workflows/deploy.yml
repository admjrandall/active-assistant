name: Build Standalone App

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows you to trigger the build manually if needed

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Single HTML File
        run: npm run build

      - name: Upload HTML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActiveAssistant-Executable
          path: dist/index.html
          retention-days: 14 # Keeps the download link active for 2 weeks